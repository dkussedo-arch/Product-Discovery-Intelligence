# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: PDI Stage 8 document analysis eval gate — 85% minimum pass rate to deploy (12 test cases; tc-001/tc-002 are Stage 8 baselines)

prompts:
  - file://document-analysis-prompt.yaml

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      max_tokens: 2048
      temperature: 0.2

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: file://assert-document-output.mjs

tests: file://test-cases.promptfoo.yaml
